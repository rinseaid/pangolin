name: pangolin

services:
  pangolin:
    image: fosrl/pangolin:ee-1.19.0@sha256:b0e208afffab11a84807e909b7c6d1def3c12904b8df6386cf251434048f8d09
    container_name: pangolin
    restart: unless-stopped
    environment:
      SERVER_SECRET: "${SERVER_SECRET}"
      CROWDSEC_BOUNCER_KEY: "${CROWDSEC_BOUNCER_KEY}"
      PANGOLIN_ROOT_API_KEY: "3g90vxh995ip44m.ezmu7xmntlwztmidu6b3ntyefs75ajp4u7sfoc3k"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: 10s
      timeout: 10s
      retries: 15

  gerbil:
    image: fosrl/gerbil:1.4.1@sha256:1d462197478cef9eb7c6e7f8b9aa1b6bef82073ec5e4e81f1ad87069f330731b
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ./config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "443:443"
      - "80:80"
      - "51820:51820/udp"
      - "21820:21820/udp"

  traefik:
    image: traefik:v3.7@sha256:6b9cbca6fac42ab0075f5437d8dc1685cfd188626d8d515839ea94f8b6271c42
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    environment:
      CROWDSEC_BOUNCER_KEY: "${CROWDSEC_BOUNCER_KEY}"
      CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN}"
      DYNAMIC_CONFIG_REV: "6"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "cp /etc/traefik/dynamic_config.yml /tmp/dynamic_config.yml && sed -i \"s|__CROWDSEC_BOUNCER_KEY__|$$CROWDSEC_BOUNCER_KEY|g\" /tmp/dynamic_config.yml && exec traefik --configFile=/etc/traefik/traefik_config.yml"
    volumes:
      - ./config/traefik:/etc/traefik
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      GID: "1000"
      COLLECTIONS: >-
        crowdsecurity/traefik
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
      PARSERS: crowdsecurity/whitelists
      ENROLL_TAGS: docker
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=false"
    volumes:
      - ./config/crowdsec:/etc/crowdsec
      - ./config/crowdsec/db:/var/lib/crowdsec/data
      - ./config/traefik/logs:/var/log/traefik:ro

networks:
  default:
    driver: bridge
    name: pangolin
    enable_ipv6: true
