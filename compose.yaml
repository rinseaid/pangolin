name: pangolin

services:
  pangolin:
    image: fosrl/pangolin:ee-latest
    container_name: pangolin
    restart: unless-stopped
    environment:
      CROWDSEC_BOUNCER_KEY: "${CROWDSEC_BOUNCER_KEY}"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: 10s
      timeout: 10s
      retries: 15

  gerbil:
    image: fosrl/gerbil:latest
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ./config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "443:443"
      - "80:80"
      - "51820:51820/udp"
      - "21820:21820/udp"

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    environment:
      CROWDSEC_BOUNCER_KEY: "${CROWDSEC_BOUNCER_KEY}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'sed -i "s|\$${CROWDSEC_BOUNCER_KEY}|$$CROWDSEC_BOUNCER_KEY|g" /etc/traefik/dynamic_config.yml && exec traefik --configFile=/etc/traefik/traefik_config.yml'
    volumes:
      - ./config/traefik:/etc/traefik
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      GID: "1000"
      COLLECTIONS: >-
        crowdsecurity/traefik
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
      PARSERS: crowdsecurity/whitelists
      ENROLL_TAGS: docker
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=false"
    volumes:
      - ./config/crowdsec:/etc/crowdsec
      - ./config/crowdsec/db:/var/lib/crowdsec/data
      - ./config/traefik/logs:/var/log/traefik:ro

networks:
  default:
    driver: bridge
    name: pangolin
    enable_ipv6: true
